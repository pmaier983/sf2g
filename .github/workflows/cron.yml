name: Cron — Sync All Users

on:
  schedule:
    # Run every hour to cycle through all users within a day.
    # Each run syncs up to 6 users (Cloudflare free plan subrequest limit).
    # 24 runs/day × 6 users = 144 users/day capacity.
    # Strava budget: 24 runs × ~12 API calls = ~288/day (well within 2,000 limit).
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15

    steps:
      - name: Trigger cron jobs on deployed app
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL || 'https://sf2ging.com' }}
        run: |
          echo "🕐 Triggering cron jobs at ${APP_URL}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: ${HTTP_CODE}"
          echo "Response: ${BODY}"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Cron jobs triggered successfully"
          else
            echo "❌ Cron jobs failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
