name: Cron — Sync All Users

on:
  schedule:
    # Run every 6 hours: midnight, 6am, noon, 6pm UTC
    # This gives 4 runs/day × 85 Strava API calls/run = 340 total
    # Well within Strava's 2,000/day limit with ~80% headroom for manual syncs
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger cron jobs on deployed app
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL || 'https://sf2ging.com' }}
        run: |
          echo "🕐 Triggering cron jobs at ${APP_URL}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: ${HTTP_CODE}"
          echo "Response: ${BODY}"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Cron jobs triggered successfully"
          else
            echo "❌ Cron jobs failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
